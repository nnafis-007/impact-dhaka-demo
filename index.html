<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DMP Shohayok - AI-Assisted GD Report Generator</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="./bpc_data.js"></script>

    <style>
      body {
        background: radial-gradient(circle at top right, #e5eef8 0%, #f8fafc 35%, #f6f8fc 100%);
      }

      .panel-card {
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid #d6dce7;
        border-radius: 14px;
        box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid #cbd5e1;
        border-top-color: #1d4ed8;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      const DEFAULT_ENTITIES = {
        complainant_name: null,
        accused_names: [],
        victim_names: [],
        location_area: null,
        location_thana: null,
        incident_date: null,
        incident_time: null,
        incident_type: null,
        evidence_mentioned: [],
        vehicles_mentioned: []
      };

      const DEMO_SCENARIOS = [
        {
          id: "A",
          label: "Scenario A: Motorbike Theft",
          text: "আজ রাত ১০টার দিকে ধানমন্ডি ২৭ নম্বর রোডে আমার Honda CB Twister (Dhaka Metro Ga 11-1234) চুরি হয়ে গেছে। আমি রাকিবুল হাসান। চোরের চেহারা দেখা যায়নি।"
        },
        {
          id: "B",
          label: "Scenario B: Road Accident",
          text: "On 10 April 2026 at approximately 7:30 AM near Mirpur 10 roundabout, a bus (Dhaka Metro B 15-5678) hit a rickshaw driver named Karim Mia, 45 years old. Karim sustained serious head injuries and was taken to DMCH. The bus driver fled the scene."
        },
        {
          id: "C",
          label: "Scenario C: Phone Snatching",
          text: "Yesterday evening around 6 PM at Gulshan 1 circle, two men on a motorcycle snatched the mobile phone (Samsung A54) of complainant Nusrat Jahan. The accused threatened her with a knife before fleeing towards Badda."
        }
      ];

      function toArrayValue(value) {
        if (Array.isArray(value)) {
          return value;
        }
        if (!value) {
          return [];
        }
        return String(value)
          .split(",")
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function parseJsonResponse(rawText) {
        const trimmed = rawText.trim();
        try {
          return JSON.parse(trimmed);
        } catch (_) {
          const blockMatch = trimmed.match(/```(?:json)?\s*([\s\S]*?)```/i);
          if (blockMatch && blockMatch[1]) {
            return JSON.parse(blockMatch[1].trim());
          }

          const firstBrace = trimmed.indexOf("{");
          const lastBrace = trimmed.lastIndexOf("}");
          if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
            return JSON.parse(trimmed.slice(firstBrace, lastBrace + 1));
          }

          throw new Error("The API did not return valid JSON.");
        }
      }

      function normalizeEntities(input = {}) {
        const output = { ...DEFAULT_ENTITIES, ...input };
        output.accused_names = toArrayValue(output.accused_names);
        output.victim_names = toArrayValue(output.victim_names);
        output.evidence_mentioned = toArrayValue(output.evidence_mentioned);
        output.vehicles_mentioned = toArrayValue(output.vehicles_mentioned);

        return output;
      }

      async function callGroq(messages, apiKey) {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            max_completion_tokens: 1800,
            temperature: 0.1,
            top_p: 1,
            stream: false,
            messages
          })
        });

        if (!response.ok) {
          const detail = await response.text();
          throw new Error(`API request failed (${response.status}): ${detail}`);
        }

        const json = await response.json();
        const textParts = json?.choices?.[0]?.message?.content || "";

        if (!textParts.trim()) {
          throw new Error("No text response returned from the API.");
        }

        return textParts;
      }

      async function extractEntities(incidentText, apiKey) {
        const systemPrompt = "You are an AI assistant for Dhaka Metropolitan Police. Extract structured information from the incident description. Return ONLY valid JSON with these fields: complainant_name, accused_names (array), victim_names (array), location_area, location_thana, incident_date, incident_time, incident_type, evidence_mentioned (array), vehicles_mentioned (array). If a field is not mentioned, use null. Do not include any text outside the JSON object.";

        const raw = await callGroq(
          [
            {
              role: "system",
              content: systemPrompt
            },
            {
              role: "user",
              content: `Incident description:\n${incidentText}`
            }
          ],
          apiKey
        );

        return normalizeEntities(parseJsonResponse(raw));
      }

      async function generateGDReport(incidentText, entities, apiKey) {
        const systemPrompt = [
          "You are a legal assistant for Dhaka Metropolitan Police helping draft General Diary (GD) entries.",
          "Given an incident description and extracted entities, do two things:",
          "(1) Identify applicable Bangladesh Penal Code sections from this reference list. Return each match with a one-sentence justification and a confidence score 0-1.",
          "(2) Draft a formal GD entry in DMP format using official **Bengali** legal language conventions.",
          "The GD must include: GD number placeholder, date/time, complainant info, incident narrative, accused info, applicable BPC sections, and officer remarks section.",
          "Return ONLY valid JSON in this schema:",
          "{\"bpc_matches\":[{\"section\":\"...\",\"title\":\"...\",\"justification\":\"...\",\"confidence\":0.0}],\"gd_draft\":\"full GD text here\"}",
          "Reference List:",
          JSON.stringify(BPC_DATA)
        ].join("\n");

        const raw = await callGroq(
          [
            {
              role: "system",
              content: systemPrompt
            },
            {
              role: "user",
              content: `Incident description:\n${incidentText}\n\nExtracted entities:\n${JSON.stringify(entities)}`
            }
          ],
          apiKey
        );

        const parsed = parseJsonResponse(raw);
        return {
          bpc_matches: Array.isArray(parsed.bpc_matches) ? parsed.bpc_matches : [],
          gd_draft: parsed.gd_draft || ""
        };
      }

      function App() {
        const [apiKey, setApiKey] = useState("");
        const [keySource, setKeySource] = useState("not-loaded");
        const [incidentText, setIncidentText] = useState("");
        const [entities, setEntities] = useState({ ...DEFAULT_ENTITIES });
        const [bpcMatches, setBpcMatches] = useState([]);
        const [selectedSections, setSelectedSections] = useState({});
        const [gdDraft, setGdDraft] = useState("");
        const [isLoading, setIsLoading] = useState(false);
        const [errorMessage, setErrorMessage] = useState("");
        const [lastDurationSec, setLastDurationSec] = useState(null);
        const [generationCount, setGenerationCount] = useState(0);
        const [autoRegenerate, setAutoRegenerate] = useState(false);
        const regenTimerRef = useRef(null);

        const selectedBpcSummary = useMemo(() => {
          const active = bpcMatches.filter((item) => selectedSections[item.section]);
          return active.map((item) => `${item.section} (${item.title})`).join(", ");
        }, [bpcMatches, selectedSections]);

        useEffect(() => {
          async function loadEnvApiKey() {
            try {
              const response = await fetch("./.env", { cache: "no-store" });
              if (!response.ok) {
                setKeySource("missing");
                return;
              }

              const envText = await response.text();
              const keyMatch = envText.match(/^\s*GROQ_API_KEY\s*=\s*(.+)\s*$/m);
              if (!keyMatch || !keyMatch[1]) {
                setKeySource("missing");
                return;
              }

              const parsedKey = keyMatch[1].trim().replace(/^['\"]|['\"]$/g, "");
              if (!parsedKey) {
                setKeySource("missing");
                return;
              }

              setApiKey(parsedKey);
              setKeySource("env");
            } catch (_) {
              setKeySource("error");
            }
          }

          loadEnvApiKey();
        }, []);

        async function runGeneration(text, providedEntities = null, source = "manual") {
          if (!apiKey.trim()) {
            setErrorMessage("GROQ_API_KEY not loaded. Ensure .env contains GROQ_API_KEY=... and is served by your local server.");
            return;
          }
          if (!text.trim()) {
            setErrorMessage("Please enter an incident description.");
            return;
          }

          setErrorMessage("");
          setIsLoading(true);
          const startedAt = Date.now();

          try {
            const extracted = providedEntities || (await extractEntities(text, apiKey.trim()));
            setEntities(extracted);

            const gdResult = await generateGDReport(text, extracted, apiKey.trim());
            setBpcMatches(gdResult.bpc_matches || []);
            setGdDraft(gdResult.gd_draft || "");

            const nextSelected = {};
            (gdResult.bpc_matches || []).forEach((item) => {
              nextSelected[item.section] = true;
            });
            setSelectedSections(nextSelected);

            const tookSec = Math.max(1, Math.round((Date.now() - startedAt) / 1000));
            setLastDurationSec(tookSec);
            if (source !== "regenerate") {
              setGenerationCount((count) => count + 1);
            }

            setAutoRegenerate(true);
          } catch (error) {
            setErrorMessage(error.message || "Failed to generate report.");
          } finally {
            setIsLoading(false);
          }
        }

        useEffect(() => {
          if (!autoRegenerate || !incidentText.trim()) {
            return;
          }

          if (regenTimerRef.current) {
            clearTimeout(regenTimerRef.current);
          }

          regenTimerRef.current = setTimeout(() => {
            runGeneration(incidentText, entities, "regenerate");
          }, 1100);

          return () => {
            if (regenTimerRef.current) {
              clearTimeout(regenTimerRef.current);
            }
          };
        }, [
          entities.complainant_name,
          entities.accused_names,
          entities.victim_names,
          entities.location_area,
          entities.location_thana,
          entities.incident_date,
          entities.incident_time,
          entities.incident_type,
          entities.evidence_mentioned,
          entities.vehicles_mentioned
        ]);

        function updateEntityField(key, value, isArray = false) {
          setEntities((current) => ({
            ...current,
            [key]: isArray ? toArrayValue(value) : value || null
          }));
        }

        function toggleSection(section) {
          setSelectedSections((current) => ({
            ...current,
            [section]: !current[section]
          }));
        }

        function applyScenario(text) {
          setIncidentText(text);
          runGeneration(text, null, "manual");
        }

        function exportGD() {
          if (!gdDraft.trim()) {
            setErrorMessage("Generate a GD draft first before exporting PDF.");
            return;
          }

          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ unit: "pt", format: "a4" });

          const left = 50;
          const right = 545;
          let y = 56;

          doc.setFillColor(8, 47, 73);
          doc.rect(0, 0, 595, 42, "F");
          doc.setFont("helvetica", "bold");
          doc.setFontSize(13);
          doc.setTextColor(255, 255, 255);
          doc.text("Dhaka Metropolitan Police - DMP Shohayok", left, 26);

          doc.setDrawColor(0, 106, 78);
          doc.setLineWidth(3);
          doc.line(left, y, right, y);
          y += 20;

          doc.setTextColor(0, 0, 0);
          doc.setFont("helvetica", "bold");
          doc.setFontSize(12);
          doc.text("GENERAL DIARY (GD)", left, y);
          y += 18;

          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          doc.text(`Station: ${entities.location_thana || "[Thana Name]"}`, left, y);
          doc.text(`GD No: [Auto/Manual]`, 380, y);
          y += 14;
          doc.text(`Date: ${entities.incident_date || "[DD/MM/YYYY]"}`, left, y);
          doc.text(`Time: ${entities.incident_time || "[HH:MM]"}`, 380, y);
          y += 18;

          if (selectedBpcSummary) {
            const bpcLines = doc.splitTextToSize(`Applicable Sections: ${selectedBpcSummary}`, 495);
            doc.text(bpcLines, left, y);
            y += bpcLines.length * 12 + 8;
          }

          doc.setFontSize(11);
          const lines = doc.splitTextToSize(gdDraft, 495);
          doc.text(lines, left, y);

          doc.setFontSize(10);
          doc.setDrawColor(107, 114, 128);
          doc.line(left, 760, left + 190, 760);
          doc.text("Duty Officer Signature", left, 776);

          doc.line(345, 760, right, 760);
          doc.text("Official Seal / Stamp", 365, 776);

          doc.save("dmp-gd-report.pdf");
        }

        return (
          <div className="min-h-screen pb-10">
            <header className="bg-sky-950 text-white border-b-4 border-emerald-600 shadow-lg">
              <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                <div>
                  <h1 className="text-2xl font-bold tracking-tight">DMP Shohayok</h1>
                  <p className="text-sky-100 text-sm">AI-Assisted GD Report Generator</p>
                </div>
                <div className="flex items-center gap-2 text-sm">
                  <span className="inline-block w-3 h-3 rounded-full bg-green-600"></span>
                  <span>Govt Demo Mode</span>
                  <span className="inline-block w-3 h-3 rounded-full bg-red-600"></span>
                </div>
              </div>
            </header>

            <main className="max-w-7xl mx-auto px-4 pt-5">
              <section className="panel-card p-4 mb-5">
                <label className="block text-sm font-semibold mb-2">Groq API Key Source</label>
                <div className="flex flex-col md:flex-row gap-3 items-start md:items-center">
                  <div className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-slate-50">
                    {keySource === "env" && "Loaded from .env (GROQ_API_KEY)"}
                    {keySource === "missing" && "Could not find GROQ_API_KEY in .env"}
                    {keySource === "error" && "Failed to load .env file from the frontend"}
                    {keySource === "not-loaded" && "Loading .env..."}
                  </div>
                  <button
                    onClick={exportGD}
                    className="bg-emerald-700 hover:bg-emerald-800 text-white px-4 py-2 rounded-lg font-medium"
                  >
                    Export PDF
                  </button>
                </div>
                <p className="text-xs text-slate-500 mt-2">
                  Note: Frontend PoC mode reads GROQ_API_KEY from .env and uses it in browser requests.
                </p>
              </section>

              <section className="mb-4">
                <div className="flex flex-wrap gap-2">
                  {DEMO_SCENARIOS.map((scenario) => (
                    <button
                      key={scenario.id}
                      onClick={() => applyScenario(scenario.text)}
                      className="bg-white border border-slate-300 px-3 py-2 rounded-lg text-sm hover:bg-slate-100"
                    >
                      {scenario.label}
                    </button>
                  ))}
                </div>
              </section>

              {errorMessage && (
                <div className="mb-4 bg-red-50 border border-red-200 text-red-700 px-3 py-2 rounded-lg text-sm">
                  {errorMessage}
                </div>
              )}

              <section className="grid grid-cols-1 xl:grid-cols-3 gap-4">
                <div className="panel-card p-4">
                  <h2 className="font-semibold text-slate-800 mb-3">Incident Input</h2>
                  <textarea
                    value={incidentText}
                    onChange={(e) => {
                      setIncidentText(e.target.value);
                      setAutoRegenerate(false);
                    }}
                    className="w-full h-72 border border-slate-300 rounded-lg p-3 text-sm"
                    placeholder="Paste incident description in Bangla, English, or Banglish..."
                  />
                  <button
                    onClick={() => runGeneration(incidentText, null, "manual")}
                    disabled={isLoading}
                    className="mt-3 w-full bg-blue-700 hover:bg-blue-800 disabled:bg-blue-300 text-white rounded-lg py-2 font-medium flex items-center justify-center gap-2"
                  >
                    {isLoading && <span className="spinner" />}
                    Generate GD
                  </button>
                </div>

                <div className="panel-card p-4">
                  <h2 className="font-semibold text-slate-800 mb-3">Extracted Entities</h2>
                  <div className="space-y-2">
                    {[
                      ["complainant_name", "Complainant Name", false],
                      ["accused_names", "Accused Names (comma separated)", true],
                      ["victim_names", "Victim Names (comma separated)", true],
                      ["location_area", "Location Area", false],
                      ["location_thana", "Location Thana", false],
                      ["incident_date", "Incident Date", false],
                      ["incident_time", "Incident Time", false],
                      ["incident_type", "Incident Type", false],
                      ["evidence_mentioned", "Evidence Mentioned (comma separated)", true],
                      ["vehicles_mentioned", "Vehicles Mentioned (comma separated)", true]
                    ].map(([key, label, isArray]) => (
                      <div key={key}>
                        <label className="block text-xs font-medium text-slate-600 mb-1">{label}</label>
                        <input
                          value={isArray ? (entities[key] || []).join(", ") : entities[key] || ""}
                          onChange={(e) => updateEntityField(key, e.target.value, isArray)}
                          className="w-full border border-slate-300 rounded px-2 py-1.5 text-sm"
                        />
                      </div>
                    ))}
                  </div>
                </div>

                <div className="panel-card p-4">
                  <h2 className="font-semibold text-slate-800 mb-3">BPC Matches + GD Draft</h2>

                  <div className="mb-3 max-h-48 overflow-auto border border-slate-200 rounded-lg p-2 bg-slate-50">
                    {bpcMatches.length === 0 && (
                      <p className="text-sm text-slate-500">No matched sections yet.</p>
                    )}
                    {bpcMatches.map((match) => (
                      <label
                        key={`${match.section}-${match.title}`}
                        className="flex items-start gap-2 p-2 rounded hover:bg-white"
                      >
                        <input
                          type="checkbox"
                          checked={!!selectedSections[match.section]}
                          onChange={() => toggleSection(match.section)}
                          className="mt-1"
                        />
                        <div>
                          <div className="text-sm font-medium">
                            <span className="inline-flex items-center bg-green-100 text-green-800 px-2 py-0.5 rounded-full text-xs mr-2">
                              ✓ Match
                            </span>
                            {match.section} - {match.title}
                          </div>
                          <p className="text-xs text-slate-600">{match.justification}</p>
                        </div>
                      </label>
                    ))}
                  </div>

                  <textarea
                    value={gdDraft}
                    onChange={(e) => setGdDraft(e.target.value)}
                    className="w-full h-56 border border-slate-300 rounded-lg p-3 text-sm"
                    placeholder="Generated GD draft will appear here..."
                  />
                </div>
              </section>

              <section className="panel-card p-4 mt-5">
                <h3 className="font-semibold text-slate-800 mb-2">Impact Metrics</h3>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm">
                  <div className="bg-slate-100 rounded-lg p-3">
                    <div className="text-slate-500">Estimated Manual Time</div>
                    <div className="font-semibold text-lg">40 min</div>
                  </div>
                  <div className="bg-emerald-50 rounded-lg p-3 border border-emerald-200">
                    <div className="text-emerald-700">Time with DMP Shohayok</div>
                    <div className="font-semibold text-lg text-emerald-800">3 min</div>
                  </div>
                  <div className="bg-blue-50 rounded-lg p-3 border border-blue-200">
                    <div className="text-blue-700">Estimated Time Saved</div>
                    <div className="font-semibold text-lg text-blue-800">37 min</div>
                  </div>
                </div>

                <p className="text-xs text-slate-500 mt-3">
                  {generationCount > 0
                    ? `Generated ${generationCount} run(s). Last API turnaround: ${lastDurationSec || "-"} sec.`
                    : "Run a scenario or generate once to populate live metrics."}
                </p>
              </section>
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
